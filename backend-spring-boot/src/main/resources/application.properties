# Server configuration
server.port=8080
server.servlet.context-path=

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/tiplet
spring.datasource.username=postgres
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Stripe Integration API Config (Inject from Environment Variables)
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_simulated_placeholder_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_simulated_placeholder_secret}

# Custom Configs
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
